name: Compile and Push Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.12

      - name: Build Debug APK
        run: gradle :src:es:lectortmovip:assembleDebug --stacktrace

      - name: Deploy to builds branch
        run: |

          mkdir -p out_apk
          find . -name "*debug.apk" -exec cp {} out_apk/LectorTMO-VIP.apk \;
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout --orphan builds
          git rm -rf .
          
          mv out_apk/LectorTMO-VIP.apk .
          
          git add LectorTMO-VIP.apk
          git commit -m "Update Build: $(date)"
          git push origin builds --force
