name: Compile and Push Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.12

      - name: Build Debug APK
        run: gradle :src:es:lectortmovip:assembleDebug --stacktrace

      - name: Deploy to builds branch
        run: |
          mkdir -p deploy
          find . -name "*debug.apk" -exec cp {} deploy/LectorTMO-VIP.apk \;
          
          LAST_UPDATED=$(date +%s)
          
          cat <<EOF > deploy/index.json
          [
            {
              "name": "LectorTMO VIP",
              "pkg": "eu.kanade.tachiyomi.extension.es.lectortmovip",
              "apk": "LectorTMO-VIP.apk",
              "lang": "es",
              "code": 1,
              "version": "1.0.0",
              "nsfw": 1,
              "last_updated": $LAST_UPDATED
            }
          ]
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout --orphan builds
          git rm -rf .
          mv deploy/* .
          
          git add LectorTMO-VIP.apk index.json
          git commit -m "Update Build and Index: $(date)"
          git push origin builds --force
